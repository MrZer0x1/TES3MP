name: Windows Build

on:
  workflow_dispatch:

env:
  BUILD_TYPE: RelWithDebInfo
  BUILD_DIR: MSVC2022_64_Ninja

jobs:
  Windows:
    runs-on: windows-2022

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache downloaded dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: windows-deps-${{ hashFiles('CI/before_script.msvc.sh') }}
          restore-keys: |
            windows-deps-

      - name: Prime sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: windows-${{ env.BUILD_TYPE }}
          max-size: 1000M
          variant: sccache

      - name: Configure
        env:
          CI: true
          STEP: full
          # USE_SCCACHE is read by before_script.msvc.sh to set the compiler
          # launcher and CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded (/Z7).
          # If that block isn't in your script yet, add it - see the comment
          # in the script near USE_CCACHE for the pattern to follow.
          USE_SCCACHE: "1"
        run: |
          CI/before_script.msvc.sh \
            -v 2022 \
            -p x64 \
            -c ${{ env.BUILD_TYPE }} \
            -N \
            -i "$PWD/install"

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          source activate_msvc.sh
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel

      - name: Install
        run: |
          cd ${{ env.BUILD_DIR }}
          source activate_msvc.sh
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tes3mp-windows-x64
          path: install/
          if-no-files-found: error
